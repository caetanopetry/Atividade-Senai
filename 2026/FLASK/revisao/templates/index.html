<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial</title>

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            color: #333;
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        input:focus {
            border-color: #4caf50;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #4caf50;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #43a047;
        }

        .links button {
            background: #1976d2;
        }

        .links button:hover {
            background: #1565c0;
        }

        .links {
            margin-top: 15px;
        }

        .erro {
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

    <h1>Bem-vindo ao Site</h1>

    <div class="container">

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}


        <form action="{{ url_for('main') }}" method="POST">

            <label>Nome</label>
            <input type="text" name="nome" placeholder="Digite o nome ai meu camarada">

            <label for="telefone">Telefone:</label>
            <input 
            type="tel" 
            id="telefone" 
            name="telefone" 
            maxlength="16" 
            pattern="[0-9()+-]{1,16}" 
            title="Por favor, digite apenas números (até 12 dígitos)"
            placeholder="Somente números"
            required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Digite o email ai meu camarada">

            <button type="submit">Adicionar</button>

        </form>

        <div class="links">
            <a href="{{ url_for('contato') }}">
                <button type="button">Ver contatos</button>
            </a>

            <a href="{{ url_for('sobre') }}">
                <button type="button">Sobre</button>
            </a>
        </div>

    </div>

</body>
</html>
